modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/mr-garfield42/dynamic-villagers/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
description='''
A complete overhaul of Minecraft villages: villagers become autonomous citizens that
gather resources, build, trade, and organize into living societies.
'''

[[mixins]]
config="dynamicvillagers.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Core companion mods (see CLAUDE.md). Declared optional during early development so the
# dev environment runs before their jars are wired in; they will become "required" once
# integration code lands (guards -> Guard Villagers, theft -> Thief, villager QoL -> Villager Overhaul).
[[dependencies.${mod_id}]]
    modId="guardvillagers"
    type="optional"
    versionRange="[2.4,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="thief"
    type="optional"
    versionRange="[1.2,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="villageroverhaul"
    type="optional"
    versionRange="[3.10,)"
    ordering="AFTER"
    side="BOTH"
